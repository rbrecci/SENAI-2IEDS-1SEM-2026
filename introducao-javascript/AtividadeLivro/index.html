<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Cinematográfica</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="video-bg" muted playsinline> <source src="../AtividadeLivro/Assets/KratosXThor.mp4" type="video/mp4"> </video>

  <div id="qte-indicator">
    <div class="qte-circle">
      <div class="qte-icon"></div>
    </div>
    <div class="qte-text">Clique!</div>
  </div>

  <!-- Flash de impacto -->
  <div id="impact-flash"></div>

  <!-- Botão pular intro -->
  <button id="skip-btn">Pular Intro</button>

  <!-- Contador de golpes -->
  <div id="hit-counter"></div>

  <!-- Conteúdo principal do site -->
  <div id="main-content">
    <header id="site-header">
      <span id="header-text">God of War:Ragnarök</span>
    </header>
    <main id="content-body">
    </main>
  </div>
</body>
</html>
